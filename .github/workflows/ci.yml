name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Format, test, analyze, and document
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Formatting
        run: test -z "$(gofmt -l cmd internal)"
      - name: Module integrity
        run: |
          go mod tidy -diff
          go mod verify
      - name: Vet
        run: go vet ./...
      - name: Race tests
        run: go test -race -count=1 ./...
      - name: Documentation contracts
        run: make docs-check
      - name: Static analysis
        run: go run honnef.co/go/tools/cmd/staticcheck@2025.1.1 ./...
      - name: Vulnerability analysis
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
          - target: windows-amd64
            goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Cross-build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BUILD_TARGET: ${{ matrix.target }}
        run: go build -trimpath -o "${RUNNER_TEMP}/nugs-${BUILD_TARGET}" ./cmd/nugs
