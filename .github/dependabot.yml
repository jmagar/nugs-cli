version: 2
updates:
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  commit-message:
    prefix: deps
    prefix-development: deps
    include: scope
  cooldown:
    default-days: 7
- package-ecosystem: gomod
  directory: /
  schedule:
    interval: weekly
  commit-message:
    prefix: deps
    prefix-development: deps
    include: scope
  cooldown:
    default-days: 7
